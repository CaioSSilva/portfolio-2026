<div class="scene-wrapper">
  <div class="ui">
    <div class="top-bar">
      <button>
        <ng-icon
          [name]="theme.getTheme() === themeEnum.dark ? 'heroSun' : 'heroMoon'"
          (click)="theme.toggleTheme()"
        />
      </button>
      <button><ng-icon name="heroSpeakerWave" /></button>
      <button><ng-icon name="heroQuestionMarkCircle" /></button>
    </div>
  </div>
  <div #webglContainer class="webgl-container"></div>

  <div #cssContainer class="css-container"></div>
</div>
