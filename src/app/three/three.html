<div class="scene-wrapper">
  <div class="ui">
    <div class="top-bar">
      <div class="tooltip-wrapper">
        <button disabled><ng-icon  size="16" name="heroLightBulb" /></button>
        <span class="tooltip">{{ 
         'debug.unfinished'
        | translate }}</span>
      </div>
      <div class="tooltip-wrapper">
        <button disabled><ng-icon size="16" name="heroSpeakerWave" /></button>
        <span class="tooltip">{{ 'debug.unfinished' | translate }}</span>
      </div>
      <div class="tooltip-wrapper">
        <button
          (click)="toggleControls()"
          [disabled]="
            cameraAnimations.state() === cameraStates.FOCUSED ||
            cameraAnimations.state() === cameraStates.TRANSITIONING
          "
        >
          <ng-icon size="16"
            [name]="
              cameraAnimations.state() === cameraStates.FREE_ROAM
                ? 'heroVideoCameraSlash'
                : 'heroVideoCamera'
            "
          />
        </button>
        <span class="tooltip">
          <span class="tooltip">
            {{ 'menu.titles.camera' | translate }}
          </span>
        </span>
      </div>
      <div class="tooltip-wrapper">
        <button><ng-icon size="16" name="heroQuestionMarkCircle" /></button>
        <span class="tooltip"> {{ 'menu.titles.help' | translate }}</span>
      </div>
    </div>
  </div>
  <app-loading />
  <div #webglContainer class="webgl-container"></div>
  <div #cssContainer class="css-container"></div>
</div>
